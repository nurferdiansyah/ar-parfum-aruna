<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>AR Parfum Aruna</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.x/dist/aframe-extras.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <script>
    // Variabel global untuk mengatur putaran
    let isRotating = false;
    let rotationSpeed = 1.5; // Kecepatan awal (derajat per frame)

    // Komponen kustom A-Frame untuk memutar model secara manual
    AFRAME.registerComponent('putar-otomatis', {
      tick: function () {
        if (isRotating) {
          // Memutar model di sumbu Y (karena kemiringan X sudah dipisah ke parent)
          // Ini menjamin putarannya dari kiri ke kanan (yaw)
          this.el.object3D.rotation.y += THREE.MathUtils.degToRad(rotationSpeed);
        }
      }
    });
  </script>

  <style>
    .ui-container {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: none;
      /* Disembunyikan dulu sampai marker terlihat */
      flex-direction: row;
      gap: 10px;
    }

    button {
      padding: 12px 20px;
      font-size: 15px;
      font-weight: bold;
      border-radius: 25px;
      border: none;
      color: white;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      transition: background 0.3s;
    }

    #btn-putar {
      background: #007bff;
      /* Biru */
    }

    #btn-putar.active {
      background: #dc3545;
      /* Merah saat berputar */
    }

    #btn-kecepatan {
      background: #28a745;
      /* Hijau */
    }
  </style>
</head>

<body style="margin: 0; overflow: hidden;">

  <!-- UI Tombol -->
  <div class="ui-container" id="ui-container">
    <button id="btn-putar">Mulai Putar</button>
    <button id="btn-kecepatan">Normal</button>
  </div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="logarithmicDepthBuffer: true;">

    <a-assets>
      <audio id="musik-bg" src="musik.mp3" preload="auto"></audio>
    </a-assets>

    <!-- Marker dengan anti-getar (smooth) -->
    <a-marker preset="hiro" id="marker-utama" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
      <!-- 
        PENTING: Karena Anda men-scan marker di LAYAR LAPTOP (yang posisinya tegak/vertikal),
        maka model yang normal akan terlihat "menonjol ke depan" ke arah muka Anda (jadi terlihat dari atas).
        Untuk mengakalinya, kita memiringkan modelnya sebesar -60 derajat ke belakang agar seolah berdiri di layar.
        (Jika Anda memprint marker ini dan menaruhnya mendatar di atas meja, ubah rotasi ini jadi "0 0 0").
      -->
      <a-entity id="tilt-wrapper" rotation="-60 0 0">
        <!-- Pembungkus rotasi (putar-otomatis ditaruh di sini agar tidak dirusak oleh animasi bawaan glb) -->
        <a-entity id="putar-wrapper" putar-otomatis="">
          <a-entity 
            id="model-utama" 
            gltf-model="nur_ferdiansyah.glb" 
            scale="0.3 0.3 0.3" 
            position="0 0 0"
            animation-mixer="clip: *; loop: repeat">
          </a-entity>
        </a-entity>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const marker = document.querySelector('#marker-utama');
    const musik = document.querySelector('#musik-bg');
    const uiContainer = document.querySelector('#ui-container');
    const btnPutar = document.querySelector('#btn-putar');
    const btnKecepatan = document.querySelector('#btn-kecepatan');

    let speedLevel = 1; // 1: Normal, 2: Cepat, 3: Sangat Cepat

    // Saat marker terlihat
    marker.addEventListener('markerFound', () => {
      uiContainer.style.display = 'flex'; // Tampilkan deretan tombol
      musik.play().catch(() => { });
    });

    // Saat marker hilang
    marker.addEventListener('markerLost', () => {
      uiContainer.style.display = 'none'; // Sembunyikan tombol
      musik.pause();
    });

    // Logika ketika tombol "Putar" ditekan
    btnPutar.addEventListener('click', () => {
      isRotating = !isRotating;

      if (isRotating) {
        btnPutar.innerText = 'Berhenti';
        btnPutar.classList.add('active'); // Ubah jadi merah
      } else {
        btnPutar.innerText = 'Mulai Putar';
        btnPutar.classList.remove('active'); // Kembali biru
      }
    });

    // Logika ketika tombol "Kecepatan" ditekan
    btnKecepatan.addEventListener('click', () => {
      speedLevel++;
      if (speedLevel > 3) speedLevel = 1; // Reset ke 1 setelah level 3

      if (speedLevel === 1) {
        rotationSpeed = 1.5; // Normal
        btnKecepatan.innerText = 'Normal';
      } else if (speedLevel === 2) {
        rotationSpeed = 4; // Cepat
        btnKecepatan.innerText = 'Cepat';
      } else if (speedLevel === 3) {
        rotationSpeed = 8; // Sangat Cepat
        btnKecepatan.innerText = 'Super Cepat';
      }
    });
  </script>

</body>

</html>
