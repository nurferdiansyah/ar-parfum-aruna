<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>AR Parfum Aruna</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.x/dist/aframe-extras.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <script>
    // Variabel global untuk mengatur putaran
    let isRotating = false;
    let rotationSpeed = 1.5; // Kecepatan awal (derajat per frame)

    // Komponen kustom A-Frame untuk memutar model secara manual
    AFRAME.registerComponent('putar-otomatis', {
      tick: function () {
        if (isRotating) {
          // Memutar model di sumbu Y (karena kemiringan X sudah dipisah ke parent)
          // Ini menjamin putarannya dari kiri ke kanan (yaw)
          this.el.object3D.rotation.y += THREE.MathUtils.degToRad(rotationSpeed);
        }
      }
    });
  </script>

  <style>
    .ui-container {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: none;
      /* Disembunyikan dulu sampai marker terlihat */
      flex-direction: row;
      gap: 10px;
    }

    button {
      padding: 12px 20px;
      font-size: 15px;
      font-weight: bold;
      border-radius: 25px;
      border: none;
      color: white;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      transition: background 0.3s;
    }

    #btn-putar {
      background: #007bff;
      /* Biru */
    }

    #btn-putar.active {
      background: #dc3545;
      /* Merah saat berputar */
    }

    #btn-kecepatan {
      background: #28a745;
      /* Hijau */
    }
  </style>
</head>

<body style="margin: 0; overflow: hidden;">

  <!-- UI Tombol -->
  <div class="ui-container" id="ui-container">
    <button id="btn-putar">Mulai Putar</button>
    <button id="btn-kecepatan">Normal</button>
  </div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="logarithmicDepthBuffer: true;">

    <a-assets>
      <audio id="musik-bg" src="musik.mp3" preload="auto"></audio>
    </a-assets>

    <!-- Marker dengan anti-getar (smooth) -->
    <a-marker preset="hiro" id="marker-utama" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
      <!-- 
        Memutar 180 derajat agar tidak terbalik (tutup botol di bawah).
        Ditambahkan position Y negatif agar model turun dan pas di tengah layar
        (sebelumnya tutup botol terpotong di atas).
      -->
      <a-entity rotation="0 180 0" position="0 -0.4 0">
        <!-- 
          Kemiringan diperbaiki: 155 agar botol tegak dengan benar (tidak terbalik).
        -->
        <a-entity id="tilt-wrapper" rotation="155 0 0">
        <!-- Model utama -->
        <a-entity 
          id="model-utama" 
          gltf-model="nur_ferdiansyah.glb" 
          scale="0.3 0.3 0.3" 
          position="0 0 0" 
          putar-otomatis=""
          animation-mixer="clip: *; loop: repeat">
        </a-entity>
      </a-entity>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const marker = document.querySelector('#marker-utama');
    const musik = document.querySelector('#musik-bg');
    const uiContainer = document.querySelector('#ui-container');
    const btnPutar = document.querySelector('#btn-putar');
    const btnKecepatan = document.querySelector('#btn-kecepatan');

    let speedLevel = 1; // 1: Normal, 2: Cepat, 3: Sangat Cepat

    // Saat marker terlihat
    marker.addEventListener('markerFound', () => {
      uiContainer.style.display = 'flex'; // Tampilkan deretan tombol
      musik.play().catch(() => { });
    });

    // Saat marker hilang
